name: 40 Deploy Logic Intg
on:
  push:
    branches: [main]
    paths:
      - "src/logic-intg/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package workflows
        working-directory: src/logic-intg
        run: zip -r ../../logic-intg.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logic-intg-dist
          path: logic-intg.zip

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: logic-intg-dist
          path: dist

      - name: Deploy to Logic App Standard
        uses: azure/webapps-deploy@v3
        with:
          app-name: fxag-logic
          resource-group-name: rg-melt
          package: dist/logic-intg.zip
